<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="html(titleContent, mainContent)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:insert="${titleContent}">Teacher Session Platform</title>
    <!-- Tailwind CSS CDN for initial phase styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5', // indigo-600
                        secondary: '#ec4899', // pink-500
                    }
                }
            }
        };
    </script>
    <script>
        // Check local storage for theme
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

<body class="bg-slate-50 dark:bg-slate-900 min-h-screen font-sans antialiased text-slate-800 dark:text-slate-100 flex flex-col transition-colors duration-200">

<!-- Navigation -->
<div th:replace="include/navigation"></div>

<!-- Main Content Area with Sidebar -->
<div class="flex-grow flex flex-col md:flex-row">
    <!-- Teacher Sidebar -->
    <aside class="w-full md:w-64 bg-slate-900 border-r border-slate-800 flex-shrink-0 flex flex-col">
        <div class="py-6 px-4 flex-grow">
            <div class="text-xs font-bold text-slate-500 dark:text-slate-400 transition-colors uppercase tracking-wider mb-4 px-4">Teacher Dashboard</div>
            <nav class="space-y-1">
                <a href="/teacher/dashboard" class="flex items-center space-x-3 px-4 py-3 text-slate-300 hover:text-white rounded-xl hover:bg-slate-800 transition-colors group">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    <span class="font-bold">Overview</span>
                </a>
                <a href="/teacher/sessions/create" class="flex items-center space-x-3 px-4 py-3 text-slate-300 hover:text-white rounded-xl hover:bg-slate-800 transition-colors group">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    <span class="font-bold">Create Session</span>
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-full min-w-0 bg-slate-50 dark:bg-slate-900 transition-colors duration-200">
        <th:block th:insert="${mainContent}"></th:block>
    </main>
</div>

<!-- Footer -->
<div th:replace="include/footer"></div>

</body>

</html>
