<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="html(titleContent, mainContent)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:insert="${titleContent}">Teacher Session Platform</title>
    <!-- Tailwind CSS CDN for initial phase styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5', // indigo-600
                        secondary: '#ec4899', // pink-500
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-800 flex flex-col">

<!-- Navigation -->
<div th:replace="include/navigation">&copy; 2016 The Static Templates</div>

<!-- Main Content -->
<main class="flex-grow">
    <th:block th:insert="${mainContent}"></th:block>
</main>

<!-- Footer -->
<div th:replace="include/footer">&copy; 2016 The Static Templates</div>

</body>

</html>
