<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="html(titleContent, mainContent)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:insert="${titleContent}">Teacher Session Platform</title>
    <!-- Tailwind CSS CDN for initial phase styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5', // indigo-600
                        secondary: '#ec4899', // pink-500
                    }
                }
            }
        };
    </script>
    <script>
        // Check local storage for theme
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

<body class="bg-slate-50 dark:bg-slate-900 min-h-screen font-sans antialiased text-slate-800 dark:text-slate-100 flex flex-col transition-colors duration-200">

<!-- Navigation -->
<div th:replace="include/navigation">&copy; 2016 The Static Templates</div>

<!-- Main Content -->
<main class="flex-grow">
    <th:block th:insert="${mainContent}"></th:block>
</main>

<!-- Footer -->
<div th:replace="include/footer">&copy; 2016 The Static Templates</div>

</body>

</html>
