<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::title}, ~{::content})}">
<head>
    <title>LearnHub - Server Error</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 flex flex-col items-center justify-center text-center">
        <svg class="w-24 h-24 text-red-500 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
        <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-4">Something went wrong</h1>
        <p class="text-xl text-slate-600 mb-8 max-w-2xl">
            We experienced an unexpected server error. Our team has been notified and we're looking into it.
        </p>
        
        <div class="bg-red-50 border border-red-100 rounded-2xl p-6 mb-8 w-full max-w-lg">
            <p class="text-sm font-bold text-red-800 mb-1">Error Reference ID:</p>
            <p class="text-2xl font-mono text-slate-900 bg-white px-4 py-2 rounded-lg border border-red-200 inline-block" th:text="${bugRefId}">12345</p>
            <p class="text-xs text-red-600 mt-3">Please provide this ID if you contact support.</p>
        </div>

        <a href="/" class="px-8 py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-slate-800 transition-all shadow-lg hover:-translate-y-1">
            Return to Homepage
        </a>
    </div>
</th:block>
</body>
</html>
