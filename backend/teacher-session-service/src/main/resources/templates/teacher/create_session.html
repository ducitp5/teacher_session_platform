<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::title}, ~{::content})}">

<head>
    <title>LearnHub - Create Session</title>
</head>

<body>
    <th:block th:fragment="content">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

            <div class="mb-8">
                <a href="/teacher/dashboard"
                    class="group inline-flex items-center text-sm font-medium text-slate-500 hover:text-primary transition-colors mb-4">
                    <svg class="mr-2 h-4 w-4 transition-transform group-hover:-translate-x-1" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Dashboard
                </a>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Create New Session</h1>
                <p class="mt-2 text-sm text-slate-500">Fill out the details below to publish a new physical or online
                    class.</p>
            </div>

            <div th:if="${error}" class="mb-8 bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                <p class="text-sm text-red-700" th:text="${error}"></p>
            </div>

            <form class="space-y-8 bg-white p-8 rounded-3xl shadow-xl shadow-indigo-100/40 border border-slate-100"
                action="/teacher/sessions/create" method="POST" th:object="${sessionDto}">

                <!-- Basic Info -->
                <div class="space-y-6">
                    <div>
                        <h3 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">Basic
                            Information</h3>
                    </div>

                    <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                        <div class="sm:col-span-4">
                            <label for="title" class="block text-sm font-medium text-slate-700">Session Title</label>
                            <div class="mt-1">
                                <input type="text" name="title" id="title" th:field="*{title}" required
                                    class="shadow-sm focus:ring-primary focus:border-primary block w-full sm:text-sm border-slate-300 rounded-xl px-4 py-3 bg-slate-50 hover:bg-white transition-colors">
                            </div>
                        </div>

                        <div class="sm:col-span-2">
                            <label for="subject" class="block text-sm font-medium text-slate-700">Subject
                                Category</label>
                            <div class="mt-1">
                                <input type="text" name="subject" id="subject" th:field="*{subject}" required
                                    class="shadow-sm focus:ring-primary focus:border-primary block w-full sm:text-sm border-slate-300 rounded-xl px-4 py-3 bg-slate-50 hover:bg-white transition-colors">
                            </div>
                        </div>

                        <div class="sm:col-span-6">
                            <label for="description"
                                class="block text-sm font-medium text-slate-700">Description</label>
                            <div class="mt-1">
                                <textarea id="description" name="description" rows="4" th:field="*{description}"
                                    required
                                    class="shadow-sm focus:ring-primary focus:border-primary block w-full sm:text-sm border border-slate-300 rounded-xl px-4 py-3 bg-slate-50 hover:bg-white transition-colors"></textarea>
                            </div>
                            <p class="mt-2 text-xs text-slate-500">Provide a detailed outline of what will be taught.
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Scheduling & Logistics -->
                <div class="space-y-6 pt-4">
                    <div>
                        <h3 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">Scheduling &
                            Pricing</h3>
                    </div>

                    <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                        <div class="sm:col-span-3">
                            <label for="startDate" class="block text-sm font-medium text-slate-700">Start Date &
                                Time</label>
                            <div class="mt-1">
                                <input type="datetime-local" name="startDate" id="startDate" th:field="*{startDate}"
                                    required
                                    class="shadow-sm focus:ring-primary focus:border-primary block w-full sm:text-sm border-slate-300 rounded-xl px-4 py-3 bg-slate-50 hover:bg-white transition-colors">
                            </div>
                        </div>

                        <div class="sm:col-span-3">
                            <label for="durationMinutes" class="block text-sm font-medium text-slate-700">Duration
                                (minutes)</label>
                            <div class="mt-1">
                                <input type="number" name="durationMinutes" id="durationMinutes"
                                    th:field="*{durationMinutes}" required min="15" step="15"
                                    class="shadow-sm focus:ring-primary focus:border-primary block w-full sm:text-sm border-slate-300 rounded-xl px-4 py-3 bg-slate-50 hover:bg-white transition-colors">
                            </div>
                        </div>

                        <div class="sm:col-span-3">
                            <label for="price" class="block text-sm font-medium text-slate-700">Price ($)</label>
                            <div class="mt-1 relative rounded-md shadow-sm">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <span class="text-slate-500 sm:text-sm">$</span>
                                </div>
                                <input type="number" name="price" id="price" th:field="*{price}" required min="0"
                                    step="0.01"
                                    class="focus:ring-primary focus:border-primary block w-full pl-7 px-4 py-3 sm:text-sm border-slate-300 rounded-xl bg-slate-50 hover:bg-white transition-colors">
                            </div>
                        </div>

                        <div class="sm:col-span-3">
                            <label for="maxStudents" class="block text-sm font-medium text-slate-700">Maximum
                                Students</label>
                            <div class="mt-1">
                                <input type="number" name="maxStudents" id="maxStudents" th:field="*{maxStudents}"
                                    required min="1"
                                    class="shadow-sm focus:ring-primary focus:border-primary block w-full sm:text-sm border-slate-300 rounded-xl px-4 py-3 bg-slate-50 hover:bg-white transition-colors">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Location / Type -->
                <div class="space-y-6 pt-4">
                    <div>
                        <h3 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">Location</h3>
                    </div>

                    <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                        <div class="sm:col-span-6">
                            <label class="block text-sm font-medium text-slate-700 mb-2">Session Type</label>
                            <div class="flex gap-4">
                                <div class="flex-1">
                                    <input type="radio" id="type-online" name="sessionType" value="ONLINE"
                                        th:field="*{sessionType}" class="peer hidden" checked>
                                    <label for="type-online"
                                        class="flex items-center justify-center px-4 py-3 border-2 border-slate-200 rounded-xl cursor-pointer peer-checked:border-primary peer-checked:bg-indigo-50 hover:bg-slate-50 transition-colors text-sm font-bold text-slate-700">
                                        Online Meeting
                                    </label>
                                </div>
                                <div class="flex-1">
                                    <input type="radio" id="type-offline" name="sessionType" value="OFFLINE"
                                        th:field="*{sessionType}" class="peer hidden">
                                    <label for="type-offline"
                                        class="flex items-center justify-center px-4 py-3 border-2 border-slate-200 rounded-xl cursor-pointer peer-checked:border-primary peer-checked:bg-indigo-50 hover:bg-slate-50 transition-colors text-sm font-bold text-slate-700">
                                        In-Person
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="sm:col-span-6" id="online-fields">
                            <label for="meetingLink" class="block text-sm font-medium text-slate-700">Meeting Link
                                (Zoom, Meet, etc)</label>
                            <div class="mt-1">
                                <input type="url" name="meetingLink" id="meetingLink" th:field="*{meetingLink}"
                                    class="shadow-sm focus:ring-primary focus:border-primary block w-full sm:text-sm border-slate-300 rounded-xl px-4 py-3 bg-slate-50 hover:bg-white transition-colors"
                                    placeholder="https://zoom.us/j/123456789">
                            </div>
                        </div>

                        <div class="sm:col-span-6 hidden" id="offline-fields">
                            <label for="location" class="block text-sm font-medium text-slate-700">Physical
                                Location</label>
                            <div class="mt-1">
                                <input type="text" name="location" id="location" th:field="*{location}"
                                    class="shadow-sm focus:ring-primary focus:border-primary block w-full sm:text-sm border-slate-300 rounded-xl px-4 py-3 bg-slate-50 hover:bg-white transition-colors"
                                    placeholder="123 Education St, Room 101">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-6 border-t border-slate-100 flex justify-end gap-3">
                    <a href="/teacher/dashboard"
                        class="px-5 py-3 border border-slate-300 rounded-xl shadow-sm tracking-wide text-sm font-bold text-slate-700 bg-white hover:bg-slate-50 transition-colors">Cancel</a>
                    <button type="submit"
                        class="px-5 py-3 border border-transparent rounded-xl shadow-md bg-slate-900 text-white font-bold text-sm tracking-wide hover:bg-black transition-all hover:-translate-y-0.5">Create
                        Session</button>
                </div>
            </form>
        </div>

        <script>
            // Simple logic to toggle required fields based on session type
            document.addEventListener('DOMContentLoaded', function () {
                const onlineRadio = document.getElementById('type-online');
                const offlineRadio = document.getElementById('type-offline');
                const onlineFields = document.getElementById('online-fields');
                const offlineFields = document.getElementById('offline-fields');
                const meetingLink = document.getElementById('meetingLink');
                const location = document.getElementById('location');

                function toggleFields() {
                    if (onlineRadio.checked) {
                        onlineFields.classList.remove('hidden');
                        offlineFields.classList.add('hidden');
                        meetingLink.required = true;
                        location.required = false;
                    } else {
                        onlineFields.classList.add('hidden');
                        offlineFields.classList.remove('hidden');
                        meetingLink.required = false;
                        location.required = true;
                    }
                }

                onlineRadio.addEventListener('change', toggleFields);
                offlineRadio.addEventListener('change', toggleFields);
                toggleFields(); // Initial run
            });
        </script>
    </th:block>
</body>

</html>
