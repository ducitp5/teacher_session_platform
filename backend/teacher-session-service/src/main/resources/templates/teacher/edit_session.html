<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::title}, ~{::content})}">

<head>
    <title>LearnHub - Edit Session</title>
</head>

<body>
    <th:block th:fragment="content">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

            <div class="mb-8">
                <a th:href="@{'/teacher/sessions/' + ${courseSessionDto.id}}" class="text-sm text-slate-500 dark:text-slate-400 transition-colors hover:text-primary">&larr; Back to Session Detail</a>
                <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white transition-colors mt-4">Edit Session</h1>
                <p class="mt-2 text-slate-500 dark:text-slate-400 transition-colors">Update the details for your upcoming learning session.</p>
            </div>

            <style>
                .input-border {
                    display: block;
                    width: 100%;
                    border-radius: 0.75rem; /* rounded-xl */
                    padding: 0.75rem 1rem; /* px-4 py-3 */
                    border: 2px solid #cbd5e1; /* border-2 border-slate-300 dark:border-slate-600 transition-colors duration-200 */
                    background-color: #ffffff; /* bg-white dark:bg-slate-800 transition-colors duration-200 */
                    color: #0f172a; /* text-slate-900 dark:text-white transition-colors */
                    transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); /* transition-all */
                    outline: none; /* focus:outline-none */
                }
                .input-border:focus {
                    outline: none;
                    border-color: #4f46e5; /* focus:border-indigo-600 */
                    box-shadow: 0 0 0 2px #a5b4fc; /* focus:ring-2 focus:ring-indigo-300 */
                }
            </style>

            <div th:if="${error}" class="mb-8 bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                <p class="text-sm text-red-700" th:text="${error}"></p>
            </div>

            <form class="space-y-8 bg-white dark:bg-slate-800 transition-colors duration-200 p-8 rounded-3xl shadow-xl shadow-indigo-100/40 border border-slate-100 dark:border-slate-700 transition-colors duration-200"
                  th:action="@{'/teacher/sessions/' + ${courseSessionDto.id} + '/edit'}"
                  method="POST"
                  th:object="${courseSessionDto}">

                <input type="hidden" th:field="*{id}" />

                <!-- Basic Info -->
                <div class="space-y-6">
                    <div>
                        <h3 class="text-lg font-bold text-slate-900 dark:text-white transition-colors mb-4 border-b border-slate-100 dark:border-slate-700 transition-colors duration-200 pb-2">
                            Basic Information
                        </h3>
                    </div>

                    <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                        <div class="sm:col-span-4">
                            <label for="title" class="block text-sm font-medium text-slate-700">Session Title</label>
                            <div class="mt-1">
                                <input type="text" name="title" id="title" th:field="*{title}" required
                                       class="input-border">
                            </div>
                        </div>

                        <div class="sm:col-span-2">
                            <label for="subject" class="block text-sm font-medium text-slate-700">Subject
                                Category</label>
                            <div class="mt-1">
                                <input type="text" name="subject" id="subject" th:field="*{subject}" required
                                       class="input-border">
                            </div>
                        </div>

                        <div class="sm:col-span-6">
                            <label for="description"
                                   class="block text-sm font-medium text-slate-700">Description</label>
                            <div class="mt-1">
                                <textarea id="description" name="description" rows="4" th:field="*{description}"
                                          required
                                          class="input-border">
                                </textarea>
                            </div>
                            <p class="mt-2 text-xs text-slate-500 dark:text-slate-400 transition-colors">
                                Provide a detailed outline of what will be taught.
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Scheduling & Logistics -->
                <div class="space-y-6 pt-4">
                    <div>
                        <h3 class="text-lg font-bold text-slate-900 dark:text-white transition-colors mb-4 border-b border-slate-100 dark:border-slate-700 transition-colors duration-200 pb-2">
                            Scheduling & Pricing
                        </h3>
                    </div>

                    <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                        <div class="sm:col-span-3">
                            <label for="startDate" class="block text-sm font-medium text-slate-700">
                                Start Date & Time
                            </label>
                            <div class="mt-1">
                                <input type="datetime-local" name="startDate" id="startDate" th:field="*{startDate}"
                                       required
                                       class="input-border">
                            </div>
                        </div>

                        <div class="sm:col-span-3">
                            <label for="durationMinutes" class="block text-sm font-medium text-slate-700">Duration
                                (minutes)</label>
                            <div class="mt-1">
                                <input type="number"
                                       name="durationMinutes"
                                       id="durationMinutes"
                                       th:field="*{durationMinutes}"
                                       required
                                       min="15"
                                       step="15"
                                       class="input-border">
                            </div>
                        </div>

                        <div class="sm:col-span-3">
                            <label for="price" class="block text-sm font-medium text-slate-700">Price ($)</label>
                            <div class="mt-1 relative rounded-md shadow-sm">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <span class="text-slate-500 dark:text-slate-400 transition-colors sm:text-sm">$</span>
                                </div>
                                <input type="number" name="price" id="price" th:field="*{price}" required min="0"
                                       step="0.01"
                                       class="input-border pl-7">
                            </div>
                        </div>

                        <div class="sm:col-span-3">
                            <label for="maxStudents" class="block text-sm font-medium text-slate-700">
                                Maximum Students
                            </label>
                            <div class="mt-1">
                                <input type="number" name="maxStudents" id="maxStudents" th:field="*{maxStudents}"
                                       required min="1"
                                       class="input-border">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Location / Type -->
                <div class="space-y-6 pt-4">
                    <div>
                        <h3 class="text-lg font-bold text-slate-900 dark:text-white transition-colors mb-4 border-b border-slate-100 dark:border-slate-700 transition-colors duration-200 pb-2">Location</h3>
                    </div>

                    <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                        <div class="sm:col-span-6">
                            <label class="block text-sm font-medium text-slate-700 mb-2">Session Type</label>
                            <div class="flex gap-4">
                                <div class="flex-1">
                                    <input type="radio" id="type-online" name="sessionType" value="ONLINE"
                                           th:field="*{sessionType}" class="peer hidden" checked>
                                    <label for="type-online"
                                           class="flex items-center justify-center px-4 py-3 border-2 border-slate-200 dark:border-slate-700 transition-colors duration-200 rounded-xl cursor-pointer peer-checked:border-primary peer-checked:bg-indigo-50 hover:bg-slate-50 dark:bg-slate-800/50 transition-colors duration-200 transition-colors text-sm font-bold text-slate-700">
                                        Online Meeting
                                    </label>
                                </div>
                                <div class="flex-1">
                                    <input type="radio" id="type-offline" name="sessionType" value="OFFLINE"
                                           th:field="*{sessionType}" class="peer hidden">
                                    <label for="type-offline"
                                           class="flex items-center justify-center px-4 py-3 border-2 border-slate-200 dark:border-slate-700 transition-colors duration-200 rounded-xl cursor-pointer peer-checked:border-primary peer-checked:bg-indigo-50 hover:bg-slate-50 dark:bg-slate-800/50 transition-colors duration-200 transition-colors text-sm font-bold text-slate-700">
                                        In-Person
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="sm:col-span-6" id="online-fields">
                            <label for="meetingLink" class="block text-sm font-medium text-slate-700">Meeting Link
                                (Zoom, Meet, etc)
                            </label>
                            <div class="mt-1">
                                <input type="url" name="meetingLink" id="meetingLink" th:field="*{meetingLink}"
                                       class="input-border"
                                       placeholder="https://zoom.us/j/123456789">
                            </div>
                        </div>

                        <div class="sm:col-span-6 hidden" id="offline-fields">
                            <label for="location" class="block text-sm font-medium text-slate-700">
                                Physical Location
                            </label>
                            <div class="mt-1">
                                <input type="text" name="location" id="location" th:field="*{location}"
                                       class="input-border"
                                       placeholder="123 Education St, Room 101">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-6 border-t border-slate-100 dark:border-slate-700 transition-colors duration-200 flex justify-end gap-3">
                    <a th:href="@{'/teacher/sessions/' + ${courseSessionDto.id}}"
                       class="px-5 py-3 border border-slate-300 dark:border-slate-600 transition-colors duration-200 rounded-xl shadow-sm tracking-wide text-sm font-bold text-slate-700 bg-white dark:bg-slate-800 transition-colors duration-200 hover:bg-slate-50 dark:bg-slate-800/50 transition-colors duration-200 transition-colors">Cancel</a>
                    <button type="submit"
                            class="px-5 py-3 border border-transparent rounded-xl shadow-md bg-slate-900 text-white font-bold text-sm tracking-wide hover:bg-black transition-all hover:-translate-y-0.5">Save Changes
                    </button>
                </div>
            </form>

       </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const onlineRadio = document.getElementById('type-online');
                const offlineRadio = document.getElementById('type-offline');
                const onlineFields = document.getElementById('online-fields');
                const offlineFields = document.getElementById('offline-fields');
                const meetingLink = document.getElementById('meetingLink');
                const location = document.getElementById('location');

                function toggleFields() {
                    if (onlineRadio.checked) {
                        onlineFields.classList.remove('hidden');
                        offlineFields.classList.add('hidden');
                        meetingLink.required = true;
                        location.required = false;
                    } else {
                        onlineFields.classList.add('hidden');
                        offlineFields.classList.remove('hidden');
                        meetingLink.required = false;
                        location.required = true;
                    }
                }

                onlineRadio.addEventListener('change', toggleFields);
                offlineRadio.addEventListener('change', toggleFields);
                toggleFields(); // Initial run
            });
        </script>
    </th:block>
</body>

</html>
