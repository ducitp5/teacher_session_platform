<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::title}, ~{::content})}">
<head>
    <title>LearnHub - Log Details</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="mb-8 flex items-center justify-between">
            <div>
                <div class="flex items-center gap-3">
                    <h1 class="text-3xl font-black text-slate-900 tracking-tight" th:text="${'Log Detail #' + log.id}">Log Detail</h1>
                    <span class="px-3 py-1 bg-red-100 text-red-800 text-xs font-bold rounded-full">Error</span>
                </div>
                <p class="mt-1 text-sm text-slate-500" th:text="${'Recorded on ' + #temporals.format(log.createdAt, 'dd MMM yyyy HH:mm:ss')}">Recorded Date</p>
            </div>
            <a href="/admin/logs" class="text-sm font-bold text-slate-500 hover:text-slate-900 transition-colors bg-white px-4 py-2 rounded-xl border border-slate-200">
                &larr; Back to Logs
            </a>
        </div>

        <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden mb-6">
            <div class="px-6 py-5 border-b border-slate-100 bg-slate-50">
                <h3 class="text-lg font-bold text-slate-900">Request Context</h3>
            </div>
            <div class="p-6">
                <dl class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-6">
                    <div>
                        <dt class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">User</dt>
                        <dd class="text-sm font-medium text-slate-900">
                            <span th:if="${log.user != null}">
                                <a th:href="@{/admin/users}" class="text-primary hover:underline" th:text="${log.user.id + ' - ' + log.user.email}">User Link</a>
                            </span>
                            <span th:if="${log.user == null}" class="italic text-slate-500">Unauthenticated / Anonymous</span>
                        </dd>
                    </div>
                    <div>
                        <dt class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">HTTP Method</dt>
                        <dd class="text-sm font-mono font-bold bg-slate-100 inline-block px-2 py-1 rounded" th:text="${log.requestMethod ?: 'N/A'}">GET</dd>
                    </div>
                    <div class="md:col-span-2">
                        <dt class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Request URL</dt>
                        <dd class="text-sm font-mono text-slate-900 break-all bg-slate-50 p-2 rounded border border-slate-200" th:text="${log.requestUrl ?: 'N/A'}">/url</dd>
                    </div>
                    <div class="md:col-span-2">
                        <dt class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Error Message</dt>
                        <dd class="text-sm font-bold text-red-600 break-words" th:text="${log.message}">Error Message</dd>
                    </div>
                </dl>
            </div>
        </div>

        <div class="bg-slate-900 rounded-3xl shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-700 bg-slate-800 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white">Stack Trace</h3>
                <button onclick="copyStackTrace()" class="text-xs font-bold text-slate-300 hover:text-white flex items-center gap-1 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Copy
                </button>
            </div>
            <div class="p-6 overflow-x-auto">
                <pre id="stackTraceContent" class="text-xs font-mono text-slate-300 whitespace-pre-wrap word-break" th:text="${log.stackTrace}">Stack trace goes here...</pre>
            </div>
        </div>
    </div>
    
    <script>
        function copyStackTrace() {
            const content = document.getElementById('stackTraceContent').innerText;
            navigator.clipboard.writeText(content).then(() => {
                alert('Stack trace copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }
    </script>
</th:block>
</body>
</html>
