<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::title}, ~{::content})}">

<head>
    <title>LearnHub - Session Detail</title>
</head>

<body>
<th:block th:fragment="content">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

        <!-- Breadcrumbs -->
        <div th:replace="sessions/include/detail/bread-crumbs"></div>


        <div th:if="${param.error}" class="mb-8 bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
            <p class="text-sm text-red-700" th:text="${param.error}"></p>
        </div>

        <div class="lg:grid lg:grid-cols-3 lg:gap-12">
            <!-- Main Content Column -->
            <div th:replace="sessions/include/detail/main-content"></div>

            <!-- Sidebar column -->
            <div th:replace="sessions/include/detail/sidebar"></div>

        </div>
    </div>
</th:block>
</body>

</html>
