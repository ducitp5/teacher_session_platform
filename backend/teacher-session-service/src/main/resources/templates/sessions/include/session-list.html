<div th:if="${sessionDtos.empty}"
     class="text-center py-20 bg-white rounded-3xl shadow-sm border border-slate-100">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 mb-6">
        <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
             xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
            </path>
        </svg>
    </div>
    <h3 class="text-xl font-bold text-slate-900 mb-2">No sessions available</h3>
    <p class="text-slate-500 max-w-sm mx-auto">
        There are currently no sessions published by teachers. Please check back later.
    </p>
</div>

<div class="grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-3">
    <div th:each="sess : ${sessionDtos}"
         class="group rounded-3xl shadow-sm hover:shadow-xl border overflow-hidden flex flex-col transition-all duration-300 hover:-translate-y-1"
         th:classappend="${enrolledSessionIds != null and #lists.contains(enrolledSessionIds, sess.id)} ? 'bg-indigo-50 border-primary ring-2 ring-primary/20 shadow-primary/10' : 'bg-white border-slate-100'">

        <!-- Card Header -->
        <div class="relative h-48 bg-slate-100 overflow-hidden">
            <!-- Abstract Gradient Pattern instead of image for now -->
            <div class="absolute inset-0 bg-gradient-to-br from-indigo-100 to-pink-50 opacity-80 group-hover:scale-105 transition-transform duration-500">
            </div>
            <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+CgkJPHBhdGggZD0iTTIgMWEyIDIgMCAwIDAgMiAydjJMMSAxaDF6TTIgMTlhMiAyIDAgMCAwIDIgMnYtMkwxIDE5aDF6TTE5IDJhMiAyIDAgMCAwIDItMmgxTDE5IDF2MXpNMjAgMTlhMiAyIDAgMCAxLTIgMnYxbDJtMC0zWiIgZmlsbD0iIzQzMzhDQSIgZmlsbC1vcGFjaXR5PSIwLjA1IiBmaWxsLXJ1bGU9ImV2ZW5vZGQiLz4KCTwvc3ZnPg==')] opacity-60">
            </div>

            <div class="absolute top-4 left-4 flex flex-col gap-2 relative z-10">
                <div class="flex gap-2">
                    <span th:if="${sess.sessionType?.name() == 'ONLINE'}"
                          class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold leading-5 bg-indigo-100 text-indigo-800 shadow-sm backdrop-blur-sm bg-opacity-90 border border-indigo-200">
                        <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 mr-1.5 animate-pulse"></span>
                        Online
                    </span>
                    <span th:if="${sess.sessionType?.name() == 'OFFLINE'}"
                          class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold leading-5 bg-orange-100 text-orange-800 shadow-sm backdrop-blur-sm bg-opacity-90 border border-orange-200">
                        <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20"
                             xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd"
                                  d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"
                                  clip-rule="evenodd">
                            </path>
                        </svg>
                        In-Person
                    </span>
                </div>
                <div th:if="${enrolledSessionIds != null and #lists.contains(enrolledSessionIds, sess.id)}">
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-black leading-5 bg-primary text-white shadow-xl shadow-primary/30">
                        <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        <span th:text="${userDto != null and userDto.role.name() == 'TEACHER' ? 'My Course' : 'Registered'}">Registered</span>
                    </span>
                </div>
            </div>
            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur rounded-xl px-3 py-1.5 shadow-sm">
                <span class="text-sm font-black text-slate-900"
                      th:text="${'$' + sess.price}">
                    $49.99
                </span>
            </div>
        </div>

        <!-- Card Body -->
        <div class="flex-1 p-6 flex flex-col justify-between">
            <div>
                <p class="text-sm font-medium text-primary mb-2" th:text="${sess.subject}">
                    Programming
                </p>
                <a th:href="@{'/sessions/' + ${sess.id}}" class="block mt-2">
                    <h3 class="text-xl font-bold text-slate-900 group-hover:text-primary transition-colors line-clamp-2"
                        th:text="${sess.title}">
                        Introduction to Spring Boot 3 & Microservices
                    </h3>
                </a>
                <p class="mt-3 text-sm text-slate-500 line-clamp-2" th:text="${sess.description}">
                    Learn the basics of Spring Boot 3.
                </p>
            </div>

            <div class="mt-6 border-t border-slate-100 pt-5">
                <div class="flex items-center justify-between mt-2">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 h-8 w-8 rounded-full bg-indigo-100 border border-indigo-200 flex items-center justify-center text-primary font-bold text-xs ring-2 ring-white">
                            <span th:text="${#strings.substring(sess.teacherName,0,1)}">T</span>
                        </div>
                        <p class="ml-3 text-sm font-medium text-slate-700" th:text="${sess.teacherName}">
                            John Doe
                        </p>
                    </div>
                    <div class="flex items-center text-sm text-slate-500 font-medium bg-slate-50 px-2.5 py-1 rounded-lg">
                        <svg class="flex-shrink-0 mr-1.5 h-4 w-4 text-slate-400"
                             xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                             stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <span th:text="${sess.enrolledStudents + '/' + sess.maxStudents}">0/10</span>
                    </div>
                </div>

                <div class="mt-6">
                    <a th:href="@{'/sessions/' + ${sess.id}}"
                       class="block w-full text-center bg-slate-50 group-hover:bg-primary border group-hover:border-transparent border-slate-200 text-slate-700 group-hover:text-white px-4 py-2.5 rounded-xl text-sm font-bold transition-all duration-300">
                        View Details
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
