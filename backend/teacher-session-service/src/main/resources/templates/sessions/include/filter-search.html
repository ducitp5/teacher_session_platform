<form onsubmit="submitAjaxSearch(event)"
      id="filterForm"
      class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl shadow-indigo-100/50 border border-white p-6 mb-10 flex flex-col md:flex-row gap-4 items-center justify-between">
    <div class="relative w-full md:w-96">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                 fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd"
                      d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                      clip-rule="evenodd"/>
            </svg>
        </div>
        <input type="text"
               name="search"
               th:value="${currentSearch}"
               class="block w-full pl-10 pr-3 py-2 border border-slate-200 rounded-xl leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-shadow"
               placeholder="Search physical or online sessions...">

        <input type="hidden"
               name="type"
               id="typeFilter"
               th:value="${currentType}">
    </div>
    <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
        <button type="button"
                onclick="setAjaxTypeFilter('', this)"
                th:classappend="${currentType == null or currentType == '' ?
                    'bg-indigo-50 text-indigo-700 border-indigo-200'
                    :
                    'text-slate-700 hover:bg-slate-100 bg-white border-slate-200'}"
                class="filter-type-btn whitespace-nowrap rounded-lg px-4 py-2 text-sm font-medium border transition-colors"
        >
            All Types
        </button>

        <button type="button"
                onclick="setAjaxTypeFilter('ONLINE', this)"
                th:classappend="${currentType == 'ONLINE' ?
                    'bg-indigo-50 text-indigo-700 border-indigo-200'
                    :
                    'text-slate-700 hover:bg-slate-100 bg-white border-slate-200'}"
                class="filter-type-btn whitespace-nowrap rounded-lg px-4 py-2 text-sm font-medium border transition-colors"
        >
            Online
        </button>

        <button type="button"
                onclick="setAjaxTypeFilter('OFFLINE', this)"
                th:classappend="${currentType == 'OFFLINE' ?
                    'bg-indigo-50 text-indigo-700 border-indigo-200'
                    :
                    'text-slate-700 hover:bg-slate-100 bg-white border-slate-200'}"
                class="filter-type-btn whitespace-nowrap rounded-lg px-4 py-2 text-sm font-medium border transition-colors"
        >
            In Person
        </button>

        <div th:if="${userDto != null and (userDto.role.name() == 'STUDENT' or userDto.role.name() == 'TEACHER')}" class="border-l border-slate-200 mx-1 pl-3 hidden md:flex items-center">
             <input type="hidden" name="enrolledOnly" id="enrolledOnlyFilter" th:value="${enrolledOnly != null ? enrolledOnly : 'false'}">
             <button type="button"
                    onclick="toggleEnrolledOnlyFilter(this)"
                    th:classappend="${enrolledOnly != null and enrolledOnly ? 'bg-primary text-white border-primary' : 'text-slate-700 hover:bg-slate-100 bg-white border-slate-200'}"
                    class="filter-enrolled-btn whitespace-nowrap rounded-lg px-4 py-2 text-sm font-bold border transition-colors flex items-center gap-1.5"
             >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
                <span th:text="${userDto.role.name() == 'TEACHER' ? 'My Courses' : 'My Sessions'}">My Sessions</span>
             </button>
        </div>
    </div>
</form>

<script>
    function setAjaxTypeFilter(typeVal, btnElem) {
        document.getElementById('typeFilter').value = typeVal;
        
        // Reset old buttons
        const buttons = document.querySelectorAll('.filter-type-btn');
        buttons.forEach(btn => {
            btn.classList.remove('bg-indigo-50', 'text-indigo-700', 'border-indigo-200');
            btn.classList.add('text-slate-700', 'hover:bg-slate-100', 'bg-white', 'border-slate-200');
        });
        
        // Activate new button
        btnElem.classList.remove('text-slate-700', 'hover:bg-slate-100', 'bg-white', 'border-slate-200');
        btnElem.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-200');
        
        submitAjaxSearch(null);
    }

    function toggleEnrolledOnlyFilter(btnElem) {
        const input = document.getElementById('enrolledOnlyFilter');
        const isEnrolledOnly = input.value === 'true';
        input.value = isEnrolledOnly ? 'false' : 'true';
        
        if (!isEnrolledOnly) {
            btnElem.classList.remove('text-slate-700', 'hover:bg-slate-100', 'bg-white', 'border-slate-200');
            btnElem.classList.add('bg-primary', 'text-white', 'border-primary');
        } else {
            btnElem.classList.remove('bg-primary', 'text-white', 'border-primary');
            btnElem.classList.add('text-slate-700', 'hover:bg-slate-100', 'bg-white', 'border-slate-200');
        }
        
        submitAjaxSearch(null);
    }

    function submitAjaxSearch(event) {
        if(event) {
            event.preventDefault();
        }
        
        const searchInput = document.querySelector('input[name="search"]').value;
        const typeInput = document.getElementById('typeFilter').value;
        const container = document.getElementById('session-list-container');
        
        if(container) {
            container.style.opacity = '0.5';
            container.style.pointerEvents = 'none';
        }

        const queryParams = new URLSearchParams({
            search: searchInput,
            type: typeInput
        });
        
        const enrolledOnlyElem = document.getElementById('enrolledOnlyFilter');
        if (enrolledOnlyElem) {
            queryParams.append('enrolledOnly', enrolledOnlyElem.value);
        }

        fetch('/sessions/search?' + queryParams.toString())
            .then(response => {
                if(!response.ok) throw new Error('Network error');
                return response.text();
            })
            .then(html => {
                if(container) {
                    container.innerHTML = html;
                    container.style.opacity = '1';
                    container.style.pointerEvents = 'auto';
                }
            })
            .catch(err => {
                console.error('Search failed:', err);
                if(container) {
                    container.style.opacity = '1';
                    container.style.pointerEvents = 'auto';
                }
            });
    }
</script>
