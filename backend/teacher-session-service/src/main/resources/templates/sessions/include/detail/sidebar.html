<div class="mt-10 lg:mt-0">
    <div
            class="bg-white rounded-3xl shadow-xl shadow-indigo-100/40 border border-slate-100 p-8 sticky top-24">

        <div class="flex justify-between items-end mb-6">
            <div>
                <p class="text-slate-500 font-medium text-sm uppercase tracking-wide">Price</p>
                <p class="text-4xl font-black text-slate-900 mt-1" th:text="${'$' + courseSession.price}">$49
                </p>
            </div>
            <div class="text-right">
                                <span th:if="${courseSession.status?.name() == 'OPEN'}"
                                      class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold leading-5 bg-green-100 text-green-800">Available</span>
                <span th:if="${courseSession.status?.name() == 'FULL'}"
                      class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold leading-5 bg-red-100 text-red-800">Sold
                                    Out</span>
                <span th:if="${courseSession.status?.name() == 'CANCELLED'}"
                      class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold leading-5 bg-slate-100 text-slate-800">Cancelled</span>
            </div>
        </div>

        <!-- Session Meta Info -->
        <div class="space-y-4 mb-8">
            <div class="flex items-start">
                <svg class="w-5 h-5 text-indigo-400 mt-0.5 mr-3 shrink-0" fill="none"
                     stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                    </path>
                </svg>
                <div>
                    <p class="text-sm font-medium text-slate-900"
                       th:text="${#temporals.format(courseSession.startDate, 'EEEE, MMMM d, yyyy')}">Date</p>
                    <p class="text-sm text-slate-500"
                       th:text="${#temporals.format(courseSession.startDate, 'h:mm a')}">Time</p>
                </div>
            </div>
            <div class="flex items-start">
                <svg class="w-5 h-5 text-indigo-400 mt-0.5 mr-3 shrink-0" fill="none"
                     stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <div>
                    <p class="text-sm font-medium text-slate-900"
                       th:text="${courseSession.durationMinutes + ' minutes'}">Duration</p>
                </div>
            </div>
            <div class="flex items-start">
                <svg class="w-5 h-5 text-indigo-400 mt-0.5 mr-3 shrink-0" fill="none"
                     stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <div>
                    <p class="text-sm font-medium text-slate-900"
                       th:text="${courseSession.sessionType?.name() == 'ONLINE' ? 'Online Meeting' : courseSession.location}">
                        Location</p>
                    <p th:if="${courseSession.sessionType?.name() == 'ONLINE'}"
                       class="text-xs text-slate-500 mt-1">Link provided after enrollment</p>
                </div>
            </div>
            <div class="flex items-start">
                <svg class="w-5 h-5 text-indigo-400 mt-0.5 mr-3 shrink-0" fill="none"
                     stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                    </path>
                </svg>
                <div class="w-full">
                    <p class="text-sm font-medium text-slate-900 mb-1"
                       th:text="${courseSession.enrolledStudents + ' / ' + courseSession.maxStudents + ' Enrolled'}">
                        0 / 10 Enrolled</p>
                    <div class="w-full bg-slate-100 rounded-full h-2">
                        <div class="bg-gradient-to-r from-primary to-secondary h-2 rounded-full"
                             th:style="'width: ' + (${courseSession.enrolledStudents} * 100 / ${courseSession.maxStudents}) + '%'">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Enrollment Button Actions -->
        <div th:if="${userDto == null}"
             class="text-center p-4 bg-slate-50 rounded-xl border border-slate-100 mb-4">
            <p class="text-sm text-slate-600 mb-3">Please log in as a student to enroll.</p>
            <a href="/login"
               class="inline-block px-4 py-2 border border-slate-300 shadow-sm text-sm font-bold rounded-lg text-slate-700 bg-white hover:bg-slate-50 transition-colors">Log
                In</a>
        </div>

        <div th:if="${userDto != null and userDto.role.name() == 'STUDENT' and courseSession.status?.name() == 'OPEN'}">
            <form th:action="@{'/sessions/' + ${courseSession.id} + '/enroll'}" method="POST">
                <button type="submit"
                        class="w-full flex justify-center py-4 px-4 border border-transparent text-lg font-black rounded-xl text-white bg-gradient-to-r from-primary to-primary/90 hover:to-primary shadow-lg shadow-indigo-200 transition-all hover:-translate-y-1">
                    Enroll Now
                </button>
            </form>
            <p class="text-xs text-center text-slate-500 mt-4">By enrolling, you agree to our terms of
                service and cancellation policy.</p>
        </div>

        <div th:if="${userDto != null and userDto.role.name() == 'TEACHER'}"
             class="text-center text-sm font-medium text-slate-500 bg-slate-50 p-4 rounded-xl">
            Teachers cannot enroll in sessions.
        </div>
    </div>
</div>
