<div class="lg:col-span-2 space-y-10">
    <div>
        <div class="flex items-center gap-3 mb-4">
                            <span
                                    class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-indigo-100 text-primary"
                                    th:text="${courseSession.subject}">Category</span>
            <span th:if="${courseSession.sessionType?.name() == 'ONLINE'}"
                  class="flex items-center text-sm font-semibold text-green-600">
                                <span class="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></span> Online
                            </span>
            <span th:if="${courseSession.sessionType?.name() == 'OFFLINE'}"
                  class="flex items-center text-sm font-semibold text-blue-600">
                                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                     xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z">
                                    </path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg> In-Person
                            </span>
        </div>

        <h1 class="text-4xl font-black text-slate-900 dark:text-white transition-colors tracking-tight mb-6" th:text="${courseSession.title}">
            Session Title</h1>

        <!-- Instructor Info -->
        <div class="flex items-center gap-4 py-4 border-y border-slate-100 dark:border-slate-700 transition-colors duration-200">
            <div class="h-14 w-14 rounded-full bg-gradient-to-tr from-primary to-secondary p-0.5">
                <div class="h-full w-full rounded-full bg-white dark:bg-slate-800 transition-colors duration-200 flex items-center justify-center">
                                    <span
                                            class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary"
                                            th:text="${#strings.substring(courseSession.teacherName,0,1)}">T</span>
                </div>
            </div>
            <div>
                <p class="text-sm text-slate-500 dark:text-slate-400 transition-colors">Taught by</p>
                <p class="text-lg font-bold text-slate-900 dark:text-white transition-colors" th:text="${courseSession.teacherName}">Instructor
                    Name</p>
            </div>
        </div>
    </div>

    <!-- Description -->
    <div class="prose prose-slate prose-lg">
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white transition-colors mb-4">About this session</h2>
        <div class="text-slate-700 leading-relaxed whitespace-pre-line"
             th:text="${courseSession.description}">
            Description goes here.
        </div>
    </div>
</div>
