<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::title}, ~{::content})}">

<head>
    <title>LearnHub - Login</title>
</head>

<body>
<th:block th:fragment="content">
    <div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-slate-50 dark:bg-slate-800/50 transition-colors duration-200 relative overflow-hidden">
        <!-- Decorative blobs -->
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-12 right-12 w-80 h-80 bg-secondary/10 rounded-full blur-3xl"></div>

        <div class="max-w-md w-full space-y-8 bg-white dark:bg-slate-800 transition-colors duration-200 p-10 rounded-3xl shadow-xl shadow-indigo-100/50 border border-slate-100 dark:border-slate-700 transition-colors duration-200 relative z-10 transition-all">
            <div>
                <h2 class="mt-2 text-center text-3xl font-black text-slate-900 dark:text-white transition-colors tracking-tight">
                    Welcome back
                </h2>
                <p class="mt-3 text-center text-sm text-slate-500 dark:text-slate-400 transition-colors">
                    Or <a href="/register"
                          class="font-bold text-primary hover:text-indigo-800 transition-colors">
                    create a new account</a>
                </p>
            </div>

            <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                <p class="text-sm text-red-700" th:text="${error}"></p>
            </div>

            <form class="mt-8 space-y-6" action="/login" method="POST">
                <div class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">
                            Email address
                        </label>
                        <input id="email" name="email" type="email" required
                               class="appearance-none relative block w-full px-4 py-3 border border-slate-300 dark:border-slate-600 transition-colors duration-200 placeholder-slate-400 text-slate-900 dark:text-white transition-colors rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary focus:z-10 sm:text-sm bg-slate-50 dark:bg-slate-800/50 transition-colors duration-200 hover:bg-white dark:bg-slate-800 transition-colors duration-200 transition-colors"
                               placeholder="you@example.com">
                    </div>
                    <div>
                        <div class="flex items-center justify-between mb-1">
                            <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                            <a href="#"
                               class="text-xs font-medium text-primary hover:text-indigo-800 transition-colors">
                                Forgot password?
                            </a>
                        </div>
                        <input id="password" name="password" type="password" required
                               class="appearance-none relative block w-full px-4 py-3 border border-slate-300 dark:border-slate-600 transition-colors duration-200 placeholder-slate-400 text-slate-900 dark:text-white transition-colors rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary focus:z-10 sm:text-sm bg-slate-50 dark:bg-slate-800/50 transition-colors duration-200 hover:bg-white dark:bg-slate-800 transition-colors duration-200 transition-colors"
                               placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                           class="h-4 w-4 text-primary focus:ring-primary border-slate-300 dark:border-slate-600 transition-colors duration-200 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-600">
                        Remember me
                    </label>
                </div>

                <div>
                    <button type="submit"
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-lg shadow-indigo-200 transition-all hover:-translate-y-0.5">
                        Sign in
                        <svg class="ml-2 -mr-1 h-5 w-5 text-indigo-200 group-hover:text-white transition-colors"
                             xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                             aria-hidden="true">
                            <path fill-rule="evenodd"
                                  d="M10.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L12.586 11H5a1 1 0 110-2h7.586l-2.293-2.293a1 1 0 010-1.414z"
                                  clip-rule="evenodd"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
</th:block>
</body>

</html>
