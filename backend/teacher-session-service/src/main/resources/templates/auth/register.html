<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::title}, ~{::content})}">

<head>
    <title>LearnHub - Register</title>
</head>

<body>
<th:block th:fragment="content">
    <div
            class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-slate-50 relative overflow-hidden">
        <!-- Decorative blobs -->
        <div class="absolute -top-24 -right-24 w-96 h-96 bg-secondary/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-12 left-12 w-80 h-80 bg-primary/10 rounded-full blur-3xl"></div>

        <div
                class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-xl shadow-indigo-100/50 border border-slate-100 relative z-10 transition-all">
            <div>
                <h2 class="mt-2 text-center text-3xl font-black text-slate-900 tracking-tight">
                    Create an account
                </h2>
                <p class="mt-3 text-center text-sm text-slate-500">
                    Already have an account? <a href="/login"
                                                class="font-bold text-primary hover:text-indigo-800 transition-colors">Sign
                    in here</a>
                </p>
            </div>

            <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                <p class="text-sm text-red-700" th:text="${error}"></p>
            </div>

            <form class="mt-8 space-y-6" action="/register" method="POST">
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label for="firstName" class="block text-sm font-medium text-slate-700 mb-1">First
                            Name</label>
                        <input id="firstName" name="firstName" type="text" required
                               class="appearance-none block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-slate-50 hover:bg-white transition-colors"
                               placeholder="Jane">
                    </div>
                    <div class="w-1/2">
                        <label for="lastName" class="block text-sm font-medium text-slate-700 mb-1">Last
                            Name</label>
                        <input id="lastName" name="lastName" type="text" required
                               class="appearance-none block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-slate-50 hover:bg-white transition-colors"
                               placeholder="Smith">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
                    <input id="email" name="email" type="email" required
                           class="appearance-none block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-slate-50 hover:bg-white transition-colors"
                           placeholder="jane@example.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" required minlength="6"
                           class="appearance-none block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-slate-50 hover:bg-white transition-colors"
                           placeholder="••••••••">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-3">I want to...</label>
                    <div class="grid grid-cols-2 gap-4">
                        <!-- Student Option -->
                        <div>
                            <input type="radio" id="role-student" name="role" value="STUDENT" class="peer hidden"
                                   checked>
                            <label for="role-student"
                                   class="flex flex-col items-center justify-center p-4 border-2 border-slate-200 rounded-xl cursor-pointer peer-checked:border-primary peer-checked:bg-indigo-50 hover:bg-slate-50 transition-colors">
                                <svg class="w-6 h-6 text-slate-500 peer-checked:text-primary mb-2" fill="none"
                                     stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                                    </path>
                                </svg>
                                <span class="text-sm font-bold text-slate-900">Learn</span>
                            </label>
                        </div>
                        <!-- Teacher Option -->
                        <div>
                            <input type="radio" id="role-teacher" name="role" value="TEACHER" class="peer hidden">
                            <label for="role-teacher"
                                   class="flex flex-col items-center justify-center p-4 border-2 border-slate-200 rounded-xl cursor-pointer peer-checked:border-secondary peer-checked:bg-pink-50 hover:bg-slate-50 transition-colors">
                                <svg class="w-6 h-6 text-slate-500 peer-checked:text-secondary mb-2" fill="none"
                                     stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                                    </path>
                                </svg>
                                <span class="text-sm font-bold text-slate-900">Teach</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div>
                    <button type="submit"
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-slate-900 hover:bg-black focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 shadow-lg shadow-slate-300 transition-all hover:-translate-y-0.5">
                        Create Account
                        <svg class="ml-2 -mr-1 h-5 w-5 text-slate-400 group-hover:text-white transition-colors"
                             xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                             aria-hidden="true">
                            <path fill-rule="evenodd"
                                  d="M10.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L12.586 11H5a1 1 0 110-2h7.586l-2.293-2.293a1 1 0 010-1.414z"
                                  clip-rule="evenodd"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
</th:block>
</body>

</html>
