server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: always

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:teacher_session_platform}?allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: none # Hibernate schema management disabled
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true
  
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1 # Baseline existing tables as V1
    check-location: true
    locations: classpath:/db/migration

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    enabled: true

logging:
  level:
    org.springframework.web: INFO
    com.teachersession: DEBUG
